<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>XAIVON — AI-Powered Business Infrastructure Company</title>
    <meta name="description" content="XAIVON builds AI systems, automations, agents, and business infrastructure that help companies automate operations, increase efficiency, and scale without complexity." />
    <meta name="keywords" content="AI automation, AI agents, AI voice agents, business automation, logistics AI, freight automation, CRM automation, lead management, XAIVON" />
    <meta name="author" content="XAIVON" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://xaivon.com/" />
    <meta property="og:title" content="XAIVON — AI-Powered Business Infrastructure Company" />
    <meta property="og:description" content="We design AI systems, automations, agents, and business infrastructure that help companies grow without increasing operational complexity." />
    <meta property="og:image" content="https://xaivon.com/og-image.png" />
    <meta property="og:site_name" content="XAIVON" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="XAIVON — AI-Powered Business Infrastructure" />
    <meta name="twitter:description" content="AI systems, automations, and business infrastructure for modern companies. Scale without complexity." />
    <meta name="twitter:image" content="https://xaivon.com/og-image.png" />

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "XAIVON",
      "url": "https://xaivon.com",
      "logo": "https://xaivon.com/logo.png",
      "description": "AI-Powered Business Infrastructure Company specializing in AI automation, AI agents, voice AI, and logistics automation.",
      "foundingDate": "2026",
      "founder": {
        "@type": "Person",
        "name": "Raja"
      },
      "areaServed": [
        { "@type": "Country", "name": "United States" },
        { "@type": "Country", "name": "Canada" },
        { "@type": "Country", "name": "United Kingdom" },
        { "@type": "Country", "name": "Australia" }
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "email": "raja@xaivon.com",
        "availableLanguage": "English"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "AI Business Infrastructure Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "AI Automation" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "AI Chatbots" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "AI Voice Agents" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "CRM Automation" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Logistics & Freight AI" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Website Development" } }
        ]
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "XAIVON",
      "url": "https://xaivon.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://xaivon.com/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Canonical URL -->
    <link rel="canonical" href="https://xaivon.com/" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="msapplication-TileColor" content="#0A0A0A" />
  </head>
